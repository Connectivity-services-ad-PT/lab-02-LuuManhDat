openapi: 3.1.0

info:
  title: Smart Campus AI Vision API
  version: 1.0.0
  description: |
    OpenAPI contract cho Pair 01 — Camera Stream ↔ AI Vision.
    Consumer gửi frame ảnh sang AI Vision để detect object/person/event.
  contact:
    name: Lưu Mạnh Đạt
    email: datkobtg99@gmail.com

servers:
  - url: http://localhost:4010
    description: Prism Mock Server

  - url: https://api.smartcampus.local
    description: Production Placeholder

tags:
  - name: health
    description: Health check APIs

  - name: detections
    description: AI detection APIs

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      tags:
        - health
      security: []
      responses:
        '200':
          description: Endpoint kiểm tra AI Vision service còn hoạt động.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: ai-vision
                    time: '2026-05-20T08:00:00Z'

  /detections:
    post:
      operationId: createDetection
      summary: Gửi frame ảnh để AI detect
      tags:
        - detections

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectionRequest'

            examples:
              personDetection:
                value:
                  cameraId: CAM-01
                  imageUrl: https://campus.local/images/frame-01.jpg
                  detectionType: PERSON
                  description: Lấy danh sách detection đã được AI xử lý.

      responses:
        '201':
          description: Detection request đã được tạo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionAccepted'

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '422':
          $ref: '#/components/responses/UnprocessableEntity'

        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listDetections
      summary: Lấy danh sách detection
      tags:
        - detections

      parameters:
        - $ref: '#/components/parameters/Limit'

      responses:
        '200':
          description: Danh sách detection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionPage'

        '401':
          $ref: '#/components/responses/Unauthorized'

  /detections/recent:
    get:
      operationId: getRecentDetections
      summary: Lấy detection gần nhất
      tags:
        - detections

      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20

      responses:
        '200':
          description: Detection gần đây
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DetectionResult'

        '401':
          $ref: '#/components/responses/Unauthorized'

  /detections/{detectionId}:
    get:
      operationId: getDetectionById
      summary: Lấy detection theo ID
      tags:
        - detections

      parameters:
        - $ref: '#/components/parameters/DetectionId'

      responses:
        '200':
          description: Detection detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'

        '404':
          $ref: '#/components/responses/NotFound'

        '401':
          $ref: '#/components/responses/Unauthorized'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DetectionId:
      name: detectionId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:

    HealthStatus:
      type: object
      additionalProperties: false

      required:
        - status
        - service
        - time

      properties:
        status:
          type: string
          enum:
            - ok

        service:
          type: string
          example: ai-vision

        time:
          type: string
          format: date-time

    DetectionRequest:
      type: object
      additionalProperties: false

      required:
        - cameraId
        - imageUrl
        - detectionType

      properties:
        cameraId:
          type: string
          pattern: '^CAM-[0-9]{2}$'
          example: CAM-01

        imageUrl:
          type: string
          format: uri
          example: https://campus.local/images/frame-01.jpg

        detectionType:
          type: string
          enum:
            - PERSON
            - VEHICLE
            - UNKNOWN_OBJECT

        description:
          type:
            - string
            - 'null'
          maxLength: 500
          example: Camera phát hiện chuyển động

    DetectionAccepted:
      type: object
      additionalProperties: false

      required:
        - detectionId
        - acceptedAt
        - status

      properties:
        detectionId:
          type: string
          format: uuid

        acceptedAt:
          type: string
          format: date-time

        status:
          type: string
          enum:
            - ACCEPTED

    DetectionResult:
      oneOf:
        - $ref: '#/components/schemas/PersonDetection'
        - $ref: '#/components/schemas/VehicleDetection'

      discriminator:
        propertyName: resultType

        mapping:
          PERSON: '#/components/schemas/PersonDetection'
          VEHICLE: '#/components/schemas/VehicleDetection'

    PersonDetection:
      type: object
      additionalProperties: false

      required:
        - resultType
        - detectionId
        - confidence
        - timestamp

      properties:
        resultType:
          type: string
          const: PERSON

        detectionId:
          type: string
          format: uuid

        confidence:
          type: number
          minimum: 0
          maximum: 1

        personName:
          type:
            - string
            - 'null'

        timestamp:
          type: string
          format: date-time

    VehicleDetection:
      type: object
      additionalProperties: false

      required:
        - resultType
        - detectionId
        - confidence
        - plateNumber
        - timestamp

      properties:
        resultType:
          type: string
          const: VEHICLE

        detectionId:
          type: string
          format: uuid

        confidence:
          type: number
          minimum: 0
          maximum: 1

        plateNumber:
          type: string
          example: 30A-12345

        timestamp:
          type: string
          format: date-time

    DetectionPage:
      type: object
      additionalProperties: false

      required:
        - items
        - hasMore

      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DetectionResult'

        hasMore:
          type: boolean

    Problem:
      type: object
      additionalProperties: false

      required:
        - type
        - title
        - status

      properties:
        type:
          type: string
          format: uri

        title:
          type: string

        status:
          type: integer
          minimum: 400
          maximum: 599

        detail:
          type:
            - string
            - 'null'

        instance:
          type:
            - string
            - 'null'

  responses:

    BadRequest:
      description: Request không hợp lệ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Unauthorized:
      description: Thiếu Bearer token
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    UnprocessableEntity:
      description: Vi phạm business rule
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Lỗi server
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'